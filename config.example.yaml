# /etc/locksmith/config.yaml — example v2 configuration.
# See docs/v2/runbooks/m1-inference-hardening.md for migration from M0.

listen:
  host: "127.0.0.1"
  port: 9200

# Optional auth for inbound requests from agent/gateway. M0-style; per-agent
# identity arrives in M2 (T2.x).
# inbound_auth:
#   mode: "bearer"
#   token: "${LOCKSMITH_INBOUND_TOKEN}"

# HTTP CONNECT proxy used for tools whose `egress: proxied` is set
# (typically Pipelock, per D-16).
# egress_proxy: "http://127.0.0.1:8888"

logging:
  level: "info"
  # file: "/var/log/locksmith/proxy.log"

# Graceful shutdown on SIGINT/SIGTERM. Streaming requests in flight at the
# moment a signal is received get up to this many seconds to complete
# before the listener is forcibly closed (INF-1).
shutdown:
  drain_window_seconds: 30

# ── Tool APIs ──────────────────────────────────────────────
# Each tool entry describes one upstream that agents can call as
# /api/<name>/<path>. R-F2.
tools:
  - name: "github"
    description: "GitHub REST API"
    upstream: "https://api.github.com"
    egress: "proxied"   # internet-bound → Pipelock per D-16. M0's `cloud: true` still works.
    auth:
      header: "Authorization"
      value: "Bearer ${GITHUB_TOKEN}"
    timeouts:
      request_seconds: 30   # total request timeout
      idle_seconds: 60      # per-read inactivity timeout (matters for SSE)
    body_limit_bytes: 10485760

  - name: "anthropic"
    description: "Anthropic Messages API (streaming)"
    upstream: "https://api.anthropic.com"
    egress: "proxied"
    auth:
      header: "x-api-key"
      value: "${ANTHROPIC_API_KEY}"
    timeouts:
      request_seconds: 600   # multi-minute generations (R-F12)
      idle_seconds: 600

  - name: "lmstudio"
    description: "Local LM Studio"
    upstream: "http://localhost:1234"
    egress: "direct"   # LAN — no Pipelock involvement (D-16)
    timeouts:
      request_seconds: 600
      idle_seconds: 600

  - name: "tavily"
    description: "Tavily web search"
    upstream: "https://api.tavily.com"
    egress: "proxied"
    auth:
      header: "x-api-key"
      value: "${TAVILY_API_KEY}"
    timeouts:
      request_seconds: 15
      idle_seconds: 60
