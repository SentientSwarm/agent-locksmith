# /etc/locksmith/seed/catalog.yaml
#
# Curated default registrations baked into the locksmith Docker image.
# First-boot loads these into the `registrations` table with seed=1.
# Operators provide credentials via .env and override fields via the
# admin API (see locksmith {tool,model,infra} put). Operator-overridden
# rows flip seed=0 and are preserved across image upgrades; operator-
# disabled rows stay disabled across image upgrades (sticky disabled=1).
#
# Catalog version: bump on every change. The first-boot loader compares
# this against registrations_meta.seed_version and applies the diff
# idempotently:
#   - new entries → INSERT with seed=1
#   - changed seed=1 entries → UPDATE (preserves operator overrides
#     identified by seed=0)
#   - removed entries → NEVER deleted (operator suppresses via DELETE
#     which sets disabled=1)
#
# Coverage: this set deliberately exercises all three kinds (model /
# tool / infra) and all three auth shapes (none / header / bearer)
# so the loader sees every code path.
#
# Authoritative classification rationale: see
#   agents-stack/docs/plans/2026-05-06-v2.0.0-catalog-seed.md
# DEFER and SKIP entries (~25 + ~10 categories) are listed there with
# rationale; operators can register them via admin API today.

version: "2.1.0"

entries:
  # ─── Models ─────────────────────────────────────────────────────────────
  - name: anthropic
    kind: model
    description: "Anthropic Messages API"
    upstream: "https://api.anthropic.com"
    auth:
      kind: header
      header: x-api-key
      env_var: ANTHROPIC_API_KEY
    egress: proxied
    timeouts:
      request_seconds: 600
      idle_seconds: 600
    body_limit_bytes: 50000000
    metadata:
      modality: text
      provider: anthropic

  - name: openai
    kind: model
    description: "OpenAI Responses + Chat Completions API"
    upstream: "https://api.openai.com"
    auth:
      kind: bearer
      env_var: OPENAI_API_KEY
    egress: proxied
    timeouts:
      request_seconds: 600
      idle_seconds: 600
    body_limit_bytes: 50000000
    metadata:
      modality: text
      provider: openai

  - name: openrouter
    kind: model
    description: "OpenRouter (multi-provider LLM gateway)"
    upstream: "https://openrouter.ai/api"
    auth:
      kind: bearer
      env_var: OPENROUTER_API_KEY
    egress: proxied
    timeouts:
      request_seconds: 600
      idle_seconds: 600
    body_limit_bytes: 50000000
    metadata:
      modality: text
      provider: openrouter

  - name: ai-gateway
    kind: model
    description: "Vercel AI Gateway"
    upstream: "https://ai-gateway.vercel.sh/v1"
    auth:
      kind: bearer
      env_var: AI_GATEWAY_API_KEY
    egress: proxied
    timeouts:
      request_seconds: 600
      idle_seconds: 600
    body_limit_bytes: 50000000
    metadata:
      modality: text
      provider: vercel

  # Ollama — LAN-typical local inference, authless by default. Override
  # the upstream to your Ollama host:
  #   locksmith model put ollama --upstream http://your-host:11434
  - name: ollama
    kind: model
    description: "Ollama (LAN-typical local inference; authless by default)"
    upstream: "http://ollama.lan:11434"
    auth:
      kind: none
    egress: proxied
    timeouts:
      request_seconds: 600
      idle_seconds: 600
    body_limit_bytes: 50000000
    metadata:
      modality: text
      provider: ollama

  # LM Studio — `host.docker.internal:1234` resolves to the Docker host
  # on macOS / Docker Desktop. For LAN-hosted LM Studio:
  #   locksmith model put lmstudio --upstream http://host:1234 \
  #     --auth bearer=LM_STUDIO_API_KEY  # if Settings → Developer → API Key is set
  - name: lmstudio
    kind: model
    description: "LM Studio (on-host inference; optional bearer auth)"
    upstream: "http://host.docker.internal:1234"
    auth:
      kind: none
    egress: proxied
    timeouts:
      request_seconds: 600
      idle_seconds: 600
    body_limit_bytes: 50000000
    metadata:
      modality: text
      provider: lmstudio

  # ─── Tools ──────────────────────────────────────────────────────────────
  - name: tavily
    kind: tool
    description: "Tavily search API"
    upstream: "https://api.tavily.com"
    auth:
      kind: bearer
      env_var: TAVILY_API_KEY
    egress: proxied
    timeouts:
      request_seconds: 60
      idle_seconds: 60
    body_limit_bytes: 5000000
    metadata:
      capability: search
      provider: tavily

  - name: github
    kind: tool
    description: "GitHub REST API v3"
    upstream: "https://api.github.com"
    auth:
      kind: bearer
      env_var: GITHUB_TOKEN
    egress: proxied
    timeouts:
      request_seconds: 60
      idle_seconds: 60
    body_limit_bytes: 50000000
    metadata:
      capability: vcs
      provider: github

  - name: duckduckgo
    kind: tool
    description: "DuckDuckGo Instant Answer API (authless)"
    upstream: "https://api.duckduckgo.com"
    auth:
      kind: none
    egress: proxied
    timeouts:
      request_seconds: 30
      idle_seconds: 30
    body_limit_bytes: 5000000
    metadata:
      capability: search
      provider: duckduckgo

  - name: wikipedia
    kind: tool
    description: "Wikipedia REST API v1 (authless)"
    upstream: "https://en.wikipedia.org"
    auth:
      kind: none
    egress: proxied
    timeouts:
      request_seconds: 30
      idle_seconds: 30
    body_limit_bytes: 50000000
    metadata:
      capability: docs
      provider: wikipedia

  # ─── OAuth-flow models (v2.1.0+) ────────────────────────────────────────
  # All five entries below use OAuth (PKCE or device-code). Operator must
  # set LOCKSMITH_OAUTH_SEALING_KEY at daemon startup to enable OAuth
  # admin endpoints + proxy dispatch. After daemon boot, operator runs
  # `locksmith oauth bootstrap <name> --refresh-token <...>` per registration.
  #
  # client_id values are public per OAuth specs. Token-endpoint URLs
  # follow each provider's documented OAuth surface; operators on
  # private deployments can override via `locksmith model put <name>
  # --upstream ... --auth oauth_pkce=...`.

  # OpenAI ChatGPT Plus / Pro / Teams plan via OAuth device-code.
  # Replaces direct OPENAI_API_KEY for users who want their ChatGPT
  # subscription entitlement instead of API billing.
  - name: codex
    kind: model
    description: "OpenAI ChatGPT plan auth (codex CLI flow; device-code OAuth)"
    upstream: "https://chatgpt.com/backend-api"
    auth:
      kind: oauth_device_code
      client_id: "app_EMoamEEZ73f0CkXaXp7hrann"
      scopes: ["openid", "email", "profile", "offline_access"]
      device_url: "https://auth.openai.com/oauth/device/code"
      token_url: "https://auth.openai.com/oauth/token"
    egress: proxied
    timeouts:
      request_seconds: 600
      idle_seconds: 600
    body_limit_bytes: 50000000
    metadata:
      modality: text
      provider: openai
      flow: oauth_device_code

  # GitHub Copilot OAuth (device-code).
  - name: copilot
    kind: model
    description: "GitHub Copilot (device-code OAuth)"
    upstream: "https://api.githubcopilot.com"
    auth:
      kind: oauth_device_code
      client_id: "Iv1.b507a08c87ecfe98"
      scopes: ["read:user"]
      device_url: "https://github.com/login/device/code"
      token_url: "https://github.com/login/oauth/access_token"
    egress: proxied
    timeouts:
      request_seconds: 600
      idle_seconds: 600
    body_limit_bytes: 50000000
    metadata:
      modality: text
      provider: github
      flow: oauth_device_code

  # Anthropic Console OAuth (PKCE redirect). Alternative to direct
  # ANTHROPIC_API_KEY for users authenticating via console.anthropic.com.
  - name: anthropic-oauth
    kind: model
    description: "Anthropic Console OAuth (PKCE redirect)"
    upstream: "https://api.anthropic.com"
    auth:
      kind: oauth_pkce
      client_id: "9d1c250a-e61b-44d9-88ed-5944d1962f5e"
      redirect_uri: "http://127.0.0.1:54321/callback"
      scopes: ["org:create_api_key", "user:profile"]
      auth_url: "https://console.anthropic.com/oauth/authorize"
      token_url: "https://console.anthropic.com/v1/oauth/token"
    egress: proxied
    timeouts:
      request_seconds: 600
      idle_seconds: 600
    body_limit_bytes: 50000000
    metadata:
      modality: text
      provider: anthropic
      flow: oauth_pkce

  # Google Gemini CLI OAuth (PKCE).
  - name: google-gemini-cli
    kind: model
    description: "Google Gemini CLI auth (PKCE OAuth)"
    upstream: "https://generativelanguage.googleapis.com"
    auth:
      kind: oauth_pkce
      client_id: "681255809395-oo8ft2oprdrnp9e3aqf6av3hmdib135j.apps.googleusercontent.com"
      redirect_uri: "http://127.0.0.1:54321/callback"
      scopes: ["openid", "email", "profile"]
      auth_url: "https://accounts.google.com/o/oauth2/v2/auth"
      token_url: "https://oauth2.googleapis.com/token"
    egress: proxied
    timeouts:
      request_seconds: 600
      idle_seconds: 600
    body_limit_bytes: 50000000
    metadata:
      modality: text
      provider: google
      flow: oauth_pkce

  # Alibaba Qwen CLI OAuth (device-code).
  - name: qwen-cli
    kind: model
    description: "Alibaba Qwen CLI auth (device-code OAuth)"
    upstream: "https://dashscope-intl.aliyuncs.com"
    auth:
      kind: oauth_device_code
      client_id: "f0304373b74a44d2b584a3fb70ca9e56"
      scopes: ["openid", "profile", "email"]
      device_url: "https://chat.qwen.ai/api/v1/oauth2/device/code"
      token_url: "https://chat.qwen.ai/api/v1/oauth2/token"
    egress: proxied
    timeouts:
      request_seconds: 600
      idle_seconds: 600
    body_limit_bytes: 50000000
    metadata:
      modality: text
      provider: alibaba
      flow: oauth_device_code

  # ─── Infra ──────────────────────────────────────────────────────────────
  # lf-scan is the layer8-proxy prompt/code scanner sidecar. Operator-only —
  # the proxy itself calls it inline as middleware (post-v2.0.0), not agents.
  - name: lf-scan
    kind: infra
    description: "Layer8 prompt/code scanner sidecar (operator-only)"
    upstream: "http://lf-scan:8080"
    auth:
      kind: header
      header: X-Internal-Token
      env_var: LF_SCAN_INTERNAL_TOKEN
    egress: direct
    timeouts:
      request_seconds: 30
      idle_seconds: 30
    body_limit_bytes: 50000000
    metadata:
      role: middleware
      capability: prompt-scan
